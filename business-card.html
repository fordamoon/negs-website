<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Card — Matthew Alighieri</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --dark: #070D19;
    --dark-lighter: #0E1525;
    --neon: #39FF14;
    --white: #F0F2F5;
    --gray: #8A94A6;
    --gray-dim: #5A6478;

    /* 3.5 x 2 inches at 300dpi = 1050 x 600px
       We render at screen scale for preview; these are the aspect-locked dimensions */
    --card-w: 525px;
    --card-h: 300px;
  }

  html { background: #12141A; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #12141A;
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 24px;
    -webkit-font-smoothing: antialiased;
  }

  h1.page-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 8px;
  }

  .cards-wrap {
    display: flex;
    gap: 32px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  .card-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gray-dim);
  }

  /* ========================================
     CARD — 3.5 : 2 aspect ratio
     Screen preview at 525 x 300
     Print at 1050 x 600 (300dpi)
     ======================================== */
  .card {
    width: var(--card-w);
    height: var(--card-h);
    background: var(--dark);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04),
      0 8px 32px rgba(0,0,0,0.5),
      0 2px 8px rgba(0,0,0,0.3);
  }

  /* Subtle edge highlight */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.04);
    pointer-events: none;
    z-index: 10;
  }

  /* ===== FRONT ===== */
  .front {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 36px 40px;
    height: 100%;
    position: relative;
  }

  /* Neon accent bar left edge */
  .front::before {
    content: '';
    position: absolute;
    left: 0;
    top: 20%;
    bottom: 20%;
    width: 3px;
    background: var(--neon);
    border-radius: 0 2px 2px 0;
    box-shadow: 0 0 12px rgba(57,255,20,0.4);
  }

  .front .name {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.3px;
    color: var(--white);
    line-height: 1.15;
    margin-bottom: 4px;
  }

  .front .role {
    font-size: 11px;
    font-weight: 500;
    color: var(--gray);
    letter-spacing: 0.3px;
    margin-bottom: 14px;
  }

  .front .company {
    font-size: 12px;
    font-weight: 700;
    color: var(--neon);
    letter-spacing: 0.5px;
    margin-bottom: 22px;
  }

  .front .contact-lines {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .front .contact-line {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10.5px;
    font-weight: 400;
    color: var(--gray);
    letter-spacing: 0.2px;
  }

  .front .contact-line svg {
    width: 13px;
    height: 13px;
    flex-shrink: 0;
    color: var(--neon);
    opacity: 0.6;
  }

  /* ===== BACK ===== */
  .back {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 28px 40px;
    position: relative;
  }

  .back .scan-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--neon);
    margin-bottom: 14px;
  }

  .qr-container {
    width: 160px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .qr-container canvas {
    border-radius: 4px;
  }

  .back .tagline {
    font-size: 11px;
    font-style: italic;
    color: var(--gray-dim);
    margin-top: 16px;
    letter-spacing: 0.3px;
  }

  /* ===== PRINT STYLES ===== */
  @media print {
    html, body {
      background: white !important;
      padding: 0 !important;
    }
    h1.page-title, .card-label { display: none; }
    .cards-wrap { gap: 0.25in; }
    .card {
      width: 3.5in;
      height: 2in;
      border-radius: 0;
      box-shadow: none;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .card::before { border: none; }
  }

  /* Responsive for mobile preview */
  @media (max-width: 600px) {
    :root {
      --card-w: 92vw;
      --card-h: calc(92vw * 0.5714);
    }
    .front { padding: 7vw 8vw; }
    .front .name { font-size: 5.2vw; }
    .front .role { font-size: 2.6vw; }
    .front .company { font-size: 2.8vw; }
    .front .contact-line { font-size: 2.4vw; gap: 1.5vw; }
    .front .contact-line svg { width: 3vw; height: 3vw; }
    .back { padding: 6vw 8vw; }
    .back .scan-label { font-size: 2.2vw; }
    .qr-container { width: 36vw; height: 36vw; }
    .back .tagline { font-size: 2.4vw; }
  }
</style>
</head>
<body>

<h1 class="page-title">Business Card Preview &mdash; 3.5 &times; 2 in</h1>

<div class="cards-wrap">

  <!-- ========== FRONT ========== -->
  <div class="card-container">
    <span class="card-label">Front</span>
    <div class="card">
      <div class="front">
        <div class="name">Matthew Alighieri</div>
        <div class="role">Founder &amp; Growth Strategist</div>
        <div class="company">New England Growth Studio</div>
        <div class="contact-lines">
          <div class="contact-line">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/></svg>
            <span>matt@matthewalighieri.com</span>
          </div>
          <div class="contact-line">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z"/></svg>
            <span>603-707-0720</span>
          </div>
          <div class="contact-line">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5a17.92 17.92 0 0 1-8.716-2.247m0 0A8.966 8.966 0 0 1 3 12c0-1.264.26-2.467.732-3.558"/></svg>
            <span>newenglandgrowthstudio.com</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== BACK ========== -->
  <div class="card-container">
    <span class="card-label">Back</span>
    <div class="card">
      <div class="back">
        <div class="scan-label">Scan to connect</div>
        <div class="qr-container" id="qrTarget"></div>
        <div class="tagline">Will work for tokens.</div>
      </div>
    </div>
  </div>

</div>

<!-- QR Code library — lightweight, zero-dependency -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
(function() {
  // Generate QR code — neon green on dark
  var container = document.getElementById('qrTarget');
  new QRCode(container, {
    text: 'https://newenglandgrowthstudio.com/card',
    width: 160,
    height: 160,
    colorDark: '#39FF14',
    colorLight: '#070D19',
    correctLevel: QRCode.CorrectLevel.M
  });

  // Remove the default image title attribute qrcodejs adds
  setTimeout(function() {
    var img = container.querySelector('img');
    if (img) img.removeAttribute('title');
  }, 100);
})();
</script>

</body>
</html>
