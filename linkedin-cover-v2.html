  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #12141A;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;

  }

  .cover {

    height: 396px;
    background: #070D19;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* ---- Star field ---- */
  .stars {
    position: absolute;
    inset: 0;
  }

  /* ---- Lighthouse SVG — left side ---- */
  .lighthouse-wrap {
    position: absolute;
    left: 80px;
    top: 0;
    bottom: 0;
    width: 380px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lighthouse-wrap svg {
    width: 320px;
    height: 340px;
  }

  /* ---- Neon accent bar ---- */
  .accent-bar {
    position: absolute;
    left: 500px;
    top: 60px;
    bottom: 60px;
    width: 3px;
    background: #39FF14;
    border-radius: 2px;
    box-shadow: 0 0 12px rgba(57, 255, 20, 0.35);
  }

  /* ---- Text — right side ---- */
  .text-block {
    position: absolute;
    left: 540px;
    right: 80px;
    top: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .motto {
    font-size: 48px;
    font-weight: 600;
    font-style: italic;
    color: #FFFFFF;
    letter-spacing: -0.5px;
    line-height: 1.2;
    text-align: center;
    white-space: nowrap;
